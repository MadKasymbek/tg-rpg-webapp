<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Инвентарь</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js?v=2"></script>
</head>
<body>
    <div class="container">
        <div class="panel stats-panel">
            <h2>Характеристики</h2>
            <div class="stats-grid">
                <div class="stat">❤ HP: <span id="stat-hp">...</span></div>
                <div class="stat">⚔ Урон: <span id="stat-dmg">...</span></div>
                <div class="stat">🛡 Защита: <span id="stat-armor">...</span></div>
            </div>
        </div>

        <div class="panel equip-panel">
            <h2>Экипировка</h2>
            <div class="equip-slots">
                <div class="slot" id="slot-weapon">
                    <div class="slot-label">Оружие</div>
                    <div class="slot-content">Пусто</div>
                </div>
                <div class="slot" id="slot-armor">
                    <div class="slot-label">Броня</div>
                    <div class="slot-content">Пусто</div>
                </div>
            </div>
        </div>

        <div class="panel inventory-panel">
            <h2>Рюкзак</h2>
            <div class="inventory-grid" id="inventory-grid">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
